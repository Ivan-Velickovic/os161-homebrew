name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  build_macos:
    name: Homebrew install
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: uname
        run: uname -a
      - name: Tap
        run: brew tap Ivan-Velickovic/os161-homebrew https://github.com/Ivan-Velickovic/os161-hombrew
      - name: Install OS/161 toolchain
        run: brew install bmake os161-binutils os161-gcc os161-gdb sys161
